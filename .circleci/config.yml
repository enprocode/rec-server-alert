version: 2.1
jobs:
  build:
    docker:
      - image: debian:bookworm-slim

    steps:
      - checkout

      - run:
          name: Greeting
          command: echo Hello, world.

      - run:
          name: Print the Current Time
          command: date

  shellcheck:
    docker:
      - image: koalaman/shellcheck-alpine:stable

    steps:
      - checkout

      - run:
          name: Run ShellCheck on alert_rec.sh
          command: shellcheck monitor-shell-chinachu/shell/alert_rec.sh

  json-lint:
    docker:
      - image: alpine:3.20

    steps:
      - checkout

      - run:
          name: Install jq
          command: apk add --no-cache jq

      - run:
          name: Validate JSON files
          command: |
            for f in monitor-sensu-epgstation/json/*.json monitor-sensu-epgstation/json/*.json.example; do
              echo "checking $f"
              jq empty "$f"
            done

  erb-lint:
    docker:
      - image: cimg/ruby:3.2

    steps:
      - checkout

      - run:
          name: Validate ERB template syntax
          command: |
            for f in monitor-sensu-epgstation/slack_payload/*.erb; do
              echo "checking $f"
              erb -x -T - "$f" | ruby -c
            done

  docker-compose-validate:
    docker:
      - image: docker/compose:1.29.2

    steps:
      - checkout

      - run:
          name: Validate docker-compose.yml files
          command: |
            cp monitor-prometheus-grafana/grafana/grafana.secret.env.example \
               monitor-prometheus-grafana/grafana/grafana.secret.env
            docker-compose -f monitor-prometheus-grafana/docker-compose.yml config >/dev/null
            docker-compose -f monitor-prometheus-grafana/target_config/docker-compose.yml config >/dev/null
            rm monitor-prometheus-grafana/grafana/grafana.secret.env

  prometheus-config-check:
    docker:
      - image: prom/prometheus:v3.12.0
        entrypoint: /bin/sh

    steps:
      - checkout

      - run:
          name: Validate prometheus.yml and alert.rules
          command: |
            mkdir -p /etc/prometheus
            cp monitor-prometheus-grafana/prometheus/prometheus.yml /etc/prometheus/
            cp monitor-prometheus-grafana/prometheus/alert.rules /etc/prometheus/
            cp monitor-prometheus-grafana/prometheus/node.yml /etc/prometheus/
            promtool check config /etc/prometheus/prometheus.yml
            promtool check rules /etc/prometheus/alert.rules

workflows:
  build_and_lint:
    jobs:
      - build
      - shellcheck
      - json-lint
      - erb-lint
      - docker-compose-validate
      - prometheus-config-check
